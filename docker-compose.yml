services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: multiplay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: src/Multiplay.Server/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=multiplay;Username=postgres;Password=postgres
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  pgdata:
